version: 1

credentials:
  linear-example:
    fields:
      token:
        source: file
        path: ~/.agents/config/project-context/secrets/linear-example

  github-example:
    fields:
      token:
        source: command
        command: [gh, auth, token, --hostname, github.com]

  jira-example:
    fields:
      email:
        source: environment
        variable: JIRA_EXAMPLE_EMAIL
      token:
        source: environment
        variable: JIRA_EXAMPLE_API_TOKEN
