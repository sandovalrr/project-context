version: 2

providers:
  linear-example:
    type: linear
    credential: linear-example
    expected_identity:
      workspace:
        id: 00000000-0000-4000-8000-000000000001
        name: Example Workspace

  github-example:
    type: github
    credential: github-example
    expected_identity:
      login: example-user
      host: github.com

  jira-example:
    type: jira-cloud
    credential: jira-example
    expected_identity:
      site: example.atlassian.net
      account_id: example-account-id

projects:
  github.com/example/example-repository:
    aliases:
      remotes: []
      paths: []
    issues:
      default: linear
      providers:
        linear:
          type: linear
          profile: linear-example
          identifiers: ['^ENG-[0-9]+$']
          target:
            team:
              id: 00000000-0000-4000-8000-000000000002
              name: Engineering
            project:
              include:
                - id: 00000000-0000-4000-8000-000000000003
                  name: Notifications
                - id: 00000000-0000-4000-8000-000000000004
                  name: Conditions
              create_in: 00000000-0000-4000-8000-000000000003
          mappings:
            status:
              open: Backlog
              in_progress: In Progress
              done: Done
              canceled: Canceled
          create:
            required: [title, description]
            defaults:
              labels: [engineering]
            presets:
              bug:
                labels: [bug]
                template: bug-report

        github:
          type: github
          profile: github-example
          target:
            repository: inherit
            project:
              id: PVT_example
              owner: example
              number: 9
              name: Example Project
              status_field:
                id: PVTSSF_example
                name: Status
          mappings:
            status:
              open:
                state: Ready for Dev
                match:
                  states: [Idea, Ready for Dev]
              in_progress:
                state: In Development
                match:
                  states: [In Development, In Review]
              done: Done
              canceled:
                state: Done
                match:
                  state: Canceled
