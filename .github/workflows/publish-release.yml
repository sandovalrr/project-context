name: Publish Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: project-context-release
  cancel-in-progress: false

jobs:
  publish-npm:
    name: Publish exact npm artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release

    steps:
      - name: Check out the immutable release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node for npm trusted publishing
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download draft-built release assets
        run: gh release download "$TAG" --dir release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}

      - name: Verify tag, versions, checksums, SBOM, and package behavior
        id: assets
        run: |
          node scripts/verify-release.mjs release "$TAG" > release-verification.json
          node scripts/test-package.mjs "release/$(node -e 'const fs=require("node:fs"); const value=JSON.parse(fs.readFileSync("release-verification.json")); process.stdout.write(value.tarball)')"
          node -e 'const fs=require("node:fs"); const value=JSON.parse(fs.readFileSync("release-verification.json")); fs.appendFileSync(process.env.GITHUB_OUTPUT, `tarball=release/${value.tarball}\nversion=${value.version}\n`)'
        env:
          TAG: ${{ github.event.release.tag_name }}

      - name: Publish the exact tarball to npm with OIDC provenance
        run: npm publish "$TARBALL" --access public
        env:
          TARBALL: ${{ steps.assets.outputs.tarball }}

      - name: Verify npm publication
        run: node scripts/verify-publication.mjs "$VERSION" npm
        env:
          VERSION: ${{ steps.assets.outputs.version }}

  publish-registry:
    name: Publish MCP Registry metadata
    needs: publish-npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release

    steps:
      - name: Check out the immutable release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Download and verify release assets
        id: assets
        run: |
          gh release download "$TAG" --dir release
          node scripts/verify-release.mjs release "$TAG" > release-verification.json
          node -e 'const fs=require("node:fs"); const value=JSON.parse(fs.readFileSync("release-verification.json")); fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${value.version}\n`)'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}

      - name: Confirm npm exposes the exact version
        run: node scripts/verify-publication.mjs "$VERSION" npm
        env:
          VERSION: ${{ steps.assets.outputs.version }}

      - name: Install the pinned MCP Registry publisher
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz \
            --output mcp-publisher.tar.gz
          echo "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac  mcp-publisher.tar.gz" | sha256sum --check --strict
          tar --extract --gzip --file mcp-publisher.tar.gz mcp-publisher

      - name: Publish metadata to the official MCP Registry with GitHub OIDC
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish server.json

      - name: Verify MCP Registry publication
        run: node scripts/verify-publication.mjs "$VERSION" registry
        env:
          VERSION: ${{ steps.assets.outputs.version }}
