name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      release_1_0:
        description: Allow a breaking change to produce the first 1.0.0 release
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: project-context-release
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate, version, tag, and draft
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release

    steps:
      - name: Check out main with release credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install locked dependencies
        run: bun ci

      - name: Validate the release source
        run: |
          bun run check:package-age
          bun run check
          bun audit --audit-level=high

      - name: Prepare the release commit, tag, artifacts, and draft
        run: bun run release:prepare
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_1_0: ${{ inputs.release_1_0 }}
